<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page</title>
<style>
</style>
</head>
  <script src="https://unpkg.com/kaboom/dist/kaboom.js"></script>

<body>

<!-- js -->
  <script>
    kaboom({
      background: [105, 60, 0],
    })
    loadSprite("green", "/sprites/green-seed.png");
    loadSprite("grass", "/sprites/grassy.png");
    scene("first", () => { // the first scene
      var green = add([ // what will show up in the first scene
        sprite("green"),
        pos(200, 500),
        scale(0.3),
      ]);
      function addButton(txt, p, a) {
        // add button
	      var btn = add([
		    rect(240, 80, 200, 200),
		    pos(p), // position
        outline(5), // border
		    area(),
		    anchor("center"),
	      ]);
        // adds the text
      	btn.add([
		    text(txt),
		    anchor("center"), // centers text
		    color(0), // text color
	      ])
        btn.onClick(a) // if bottom is clicked
      }
      addButton("Start", vec2(200, 100), () => debug.log("Start Game")); // call function
      addButton("settings", vec2(200, 200), () => debug.log("In Settings")); // call function

    });
    scene("game", () => { // the second scene
      var map = addLevel([ // map
        "============================================",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "=                                          =",
        "============================================",
      ], {
          tileWidth: 32,
          tileHeight: 32,
          tiles: {
            "=": () => [ // symbol for sprite
            sprite("grass"),
            scale(0.2),
            area(),
            ],
          }
        })
    });
    go("first"); // will be starting scene

  </script>
</body>
