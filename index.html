<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */

        </style>

        <title>Garden Game</title>
    </head>
    <body>
        <!-- HTML -->

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://unpkg.com/kaboom/dist/kaboom.js"></script>
        <!-- <script src="script.js"></script> -->
        <script>
            // JS
            kaboom()
            // load each sprite seed
            loadSprite("blue", "/img/blue-seed.png");
            loadSprite("green", "/img/green-seed.png");
            loadSprite("orange", "/img/orange-seed.png");
            loadSprite("pink", "/img/pink-seed.png");
            loadSprite("purple", "/img/purple-seed.png");
            loadSprite("red", "/img/red-seed.png");
            loadSprite("white", "/img/white-seed.png");
            loadSprite("yellow", "/img/yellow-seed.png");
            // load each sprite flower
            loadSprite("blueF", "/img/blue-f.png");
            loadSprite("greenF", "/img/green-f.png");
            loadSprite("orangeF", "/img/orange-f.png");
            loadSprite("pinkF", "/img/pink-f.png");
            loadSprite("purpleF", "/img/purple-f.png");
            loadSprite("redF", "/img/red-f.png");
            loadSprite("whiteF", "/img/white-f.png");
            loadSprite("yellowF", "/img/yellow-f.png");

            var userName = prompt("What is your name?"); // global variable
            scene("front", () => { // front page scene
                add([
                    pos(100, 100),
                    text("Welcome to " + userName + "'s garden!", { // introduction text
                    size: 60, // text size
                    width: 550, // width the text can be before moving to a new line
                    })
                ]);
                function buttons(txt, p, a){ // custon function
                    var sButton = add([ // start button
                        rect(300, 50), // size of button
                        pos(p), // position called later
                        area(),
                        anchor("center"),
                    ]);
                    sButton.add([ // add on
                        color(0), // black text
                        text(txt), // text
                        anchor("center"),
                    ]);
                    sButton.onClick(a); // if buttons are clicked, will go to an action called
                }
                buttons("Start Game", vec2(400, 300), () => go("game")); // start button
                buttons("Instructions", vec2(400, 400), () => go("instructions")); // instruction button
            });

            scene("instructions", () =>{ // instructions scene
                add([
                    pos(50, 50),
                    text("Hello " + userName + "! Here is how you get started with your own virtual garden!" , { // greeting text
                    size: 50, // text size
                    width: 1000, // how long text will be
                    })
                ]);
                add([
                    pos(50, 250),
                    text("Click the start button on the main page to begin your virutual garden.It is up to you to choose what you want to build your garden with and do not hesitate to make a choice. There will be multiple seed packs and flowers to decorate your garden, all you have to do is click! Have fun " + userName + "!" , { // text of instructions
                    size: 35, // text size
                    width: 1100, // how long text will be
                    })
                ]);
            });

            scene("game", () =>{ // game scene
                function getSeed(){ // function to get seed
                    var userColor = prompt("Hey! Pick a color for a seed!"); // user chooses what color seed they want
                    if(userColor == "red"){  // if user types in "red", they will get a red seed
                        var redSeed = add([ // red seed
                            sprite("red"), // sprite name
                            pos(rand(150, 500), rand(150, 500)), // random placed x and y
                            scale(0.1), // size of sprite
                            area(),
                        ]);
                        redSeed.onClick(() => { // if user clicks seed, can get flower
                            destroy(redSeed); // destory the seed
                            add([
                            sprite("redF"), // sprite name
                            pos(rand(150, 800), rand(0, 500)), // random placed x and y
                            scale(0.3) // size
                            ]);
                        });
                    }
                    else if(userColor == "orange"){
                        var orangeSeed = add([ // orange seed
                            sprite("orange"),
                            pos(rand(150, 500), rand(150, 500)), // randomly placed seed
                            scale(0.1),
                            area(),
                        ]);
                        orangeSeed.onClick(() => { // if user clicks seed, can get flower
                            destroy(orangeSeed); // destory the seed
                            add([
                            sprite("orangeF"), // sprite name
                            pos(rand(150, 800), rand(0, 500)), // random placed x and y
                            scale(0.3) // size
                            ]);
                        });
                    }
                    else if(userColor == "yellow"){
                        var yellowSeed = add([ // yellow seed
                            sprite("yellow"),
                            pos(rand(150, 500), rand(150, 500)), // random place
                            scale(0.1),
                            area(),
                        ]);
                        yellowSeed.onClick(() => { // if user clicks seed, can get flower
                            destroy(yellowSeed); // destory the seed
                            add([
                            sprite("yellowF"), // sprite name
                            pos(rand(150, 800), rand(0, 500)), // random placed x and y
                            scale(0.3) // size
                            ]);
                        });
                    }
                    else if(userColor == "green"){
                        var greenSeed = add([ // green seed
                            sprite("green"),
                            pos(rand(150, 500), rand(150, 500)), // random position
                            scale(0.1),
                            area(),
                        ]);
                        greenSeed.onClick(() => { // if user clicks seed, can get flower
                            destroy(greenSeed); // destory the seed
                            add([
                            sprite("greenF"), // sprite name
                            pos(rand(150, 800), rand(0, 500)), // random placed x and y
                            scale(0.3) // size
                            ]);
                        });
                    }
                    else if(userColor == "blue"){
                        var blueSeed = add([ // blue seed
                            sprite("blue"),
                            pos(rand(150, 500), rand(150, 500)), // random
                            scale(0.1),
                            area(),
                        ]);
                        blueSeed.onClick(() => { // if user clicks seed, can get flower
                            destroy(blueSeed); // destory the seed
                            add([
                            sprite("blueF"), // sprite name
                            pos(rand(150, 800), rand(0, 500)), // random placed x and y
                            scale(0.3) // size
                            ]);
                        });
                    }
                    else if(userColor == "purple"){
                        var purpleSeed = add([ // purple seed
                            sprite("purple"),
                            pos(rand(150, 500), rand(150, 500)), // random
                            scale(0.1),
                            area(),
                        ]);
                        purpleSeed.onClick(() => { // if user clicks seed, can get flower
                            destroy(purpleSeed); // destory the seed
                            add([
                            sprite("purpleF"), // sprite name
                            pos(rand(150, 800), rand(0, 500)), // random placed x and y
                            scale(0.3) // size
                            ]);
                        });
                    }
                    else if(userColor == "pink"){
                        var pinkSeed = add([ // pink seed
                            sprite("pink"),
                            pos(rand(150, 500), rand(150, 500)), // random
                            scale(0.1),
                            area(),
                        ]);
                        pinkSeed.onClick(() => { // if user clicks seed, can get flower
                            destroy(pinkSeed); // destory the seed
                            add([
                            sprite("pinkF"), // sprite name
                            pos(rand(150, 800), rand(0, 500)), // random placed x and y
                            scale(0.3) // size
                            ]);
                        });
                    }
                    else if(userColor == "white"){
                        var whiteSeed = add([ // white seed
                            sprite("white"),
                            pos(rand(150, 500), rand(150, 500)), // random
                            scale(0.1),
                            area(),
                        ]);
                        whiteSeed.onClick(() => { // if user clicks seed, can get flower
                            destroy(whiteSeed); // destory the seed
                            add([
                            sprite("whiteF"), // sprite name
                            pos(rand(150, 800), rand(0, 500)), // random placed x and y
                            scale(0.3) // size
                            ]);
                        });
                    }
                    else {
                        alert("That is not a seed color! Try again?"); // alert user of invalid seed
                    }
                }
                var seedButton = add([ // add seed button
                    rect(300, 50), // width and length
                    pos(600, 600), // location x and y
                    area(),
                    anchor("center"),
                ]);
                seedButton.add([ // add on
                        color(0), // black text
                        text("+get seed+"), // text
                        anchor("center"), // center text
                ]);
                seedButton.onClick(() => { // if user clicks button, get seed option is offered
                    getSeed();
                });
                // redSeed.onClick(() => { // if user clicks seed, can get flower
                //     add([
                //         sprite("redF"), // sprite name
                //         pos(rand(150, 500), rand(150, 500)), // random placed x and y
                //         scale(0.1)
                //     ]);
                // });
            });
            go("front"); // start with two button scene
        </script>
    </body>
</html>
